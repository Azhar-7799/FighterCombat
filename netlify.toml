[build]
command = "npm install && npm run build"
publish = "dist"
functions = "netlify/functions"

[dev]
command = "npm run dev"
port = 3000

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "npm install && npm run build"

[build.environment]
NODE_VERSION = "20"
NODE_ENV = "production"
